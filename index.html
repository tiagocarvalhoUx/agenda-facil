<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Agenda Fácil — Agendamento online</title>
    <meta
      name="description"
      content="Agendamento online para clínicas, salões e consultórios. Seu cliente marca, remarca e cancela sozinho — sem WhatsApp manual."
    />
    <meta name="theme-color" content="#0E9F9A" />

    <!-- Favicon / ícones (otimizados) -->
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/favicon-512.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/favicon-180.png" />

    <!-- Open Graph (compartilhamento em redes/WhatsApp) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Agenda Fácil" />
    <meta property="og:title" content="Agenda Fácil — Agendamento online" />
    <meta
      property="og:description"
      content="Seu cliente marca, remarca e cancela sozinho — sem WhatsApp manual. Para clínicas, salões e consultórios."
    />
    <meta property="og:url" content="https://agenda-facil-murex.vercel.app" />
    <meta property="og:image" content="https://agenda-facil-murex.vercel.app/agenda-opengraph.jpg" />
    <meta property="og:image:type" content="image/jpeg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="800" />
    <meta property="og:image:alt" content="Agenda Fácil — agendamento online" />
    <meta property="og:locale" content="pt_BR" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Agenda Fácil — Agendamento online" />
    <meta
      name="twitter:description"
      content="Seu cliente marca, remarca e cancela sozinho — sem WhatsApp manual."
    />
    <meta name="twitter:image" content="https://agenda-facil-murex.vercel.app/agenda-opengraph.jpg" />

    <!-- Fonte do produto: Onest (self-hosted, variável). Preload do arquivo
         para reduzir o flash de fonte (ADENDO §19, performance percebida). -->
    <link
      rel="preload"
      href="/fonts/Onest-VariableFont_wght.ttf"
      as="font"
      type="font/ttf"
      crossorigin
    />

    <!-- Meta Pixel -->
    <script>
      !function(f,b,e,v,n,t,s)
      {if(f.fbq)return;n=f.fbq=function(){n.callMethod?
      n.callMethod.apply(n,arguments):n.queue.push(arguments)};
      if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
      n.queue=[];t=b.createElement(e);t.async=!0;
      t.src=v;s=b.getElementsByTagName(e)[0];
      s.parentNode.insertBefore(t,s)}(window, document,'script',
      'https://connect.facebook.net/en_US/fbevents.js');
      fbq('init', '%VITE_META_PIXEL_ID%');
      fbq('track', 'PageView');
    </script>
    <noscript><img height="1" width="1" style="display:none"
      src="https://www.facebook.com/tr?id=%VITE_META_PIXEL_ID%&ev=PageView&noscript=1"/></noscript>
    <!-- End Meta Pixel -->
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
