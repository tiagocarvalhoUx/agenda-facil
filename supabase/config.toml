# Supabase local config. Project ref is set on `supabase link`.
project_id = "agenda-saas"

[db]
port = 54322
major_version = 15

[api]
port = 54321
schemas = ["public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[auth]
# Magic Link (sem senha) para dono/profissional.
site_url = "http://localhost:5173"
additional_redirect_urls = ["http://localhost:5173"]
enable_signup = true

[auth.email]
enable_signup = true
enable_confirmations = true

# Login Google. Credenciais via env (NÃO commitar segredos) — defina
# SUPABASE_AUTH_GOOGLE_CLIENT_ID e SUPABASE_AUTH_GOOGLE_SECRET no .env do
# diretório supabase, obtidos no Google Cloud Console (OAuth 2.0 Client ID).
[auth.external.google]
enabled = true
client_id = "env(SUPABASE_AUTH_GOOGLE_CLIENT_ID)"
secret = "env(SUPABASE_AUTH_GOOGLE_SECRET)"
# skip_nonce_check ajuda no fluxo local; em produção a config é no painel.
skip_nonce_check = true

# Edge Function de notificação de novo agendamento. verify_jwt=false porque a
# chamada vem do trigger no banco (pg_net), não de um usuário logado — ela valida
# o próprio segredo NOTIFY_SECRET no header Authorization.
[functions.notify-booking]
verify_jwt = false

# Edge Function de pagamento. verify_jwt=false porque ela faz a PRÓPRIA auth:
# /subscribe valida o JWT do dono no código; /webhook valida o token do Asaas
# (header asaas-access-token). Com verify_jwt=true o gateway barraria o webhook
# do Asaas (que não manda JWT) com 401 antes de chegar no nosso código.
[functions.payments]
verify_jwt = false
